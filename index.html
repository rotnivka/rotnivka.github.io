<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ROTNIVKA | Material & Identity Architecture</title>
    <style>
        body { 
            background-color: #050505; 
            color: #e0e0e0; 
            font-family: 'Courier New', Courier, monospace; 
            display: flex; 
            flex-direction: column;
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0;
            text-align: center;
            overflow: hidden;
        }
        .container { 
            border: 1px solid #333; 
            padding: 20px; 
            width: 85%; 
            max-width: 600px;
        }
        h1 { 
            letter-spacing: 2px; 
            font-size: clamp(1rem, 5vw, 1.8rem);
            border-right: 3px solid #fff;
            display: inline-block;
            margin: 0;
            padding-right: 5px;
            animation: blink .75s step-end infinite;
        }
        p { 
            font-size: 0.7rem; 
            color: #888; 
            text-transform: uppercase; 
            margin-top: 20px;
            letter-spacing: 1px;
        }
        @keyframes blink { from, to { border-color: transparent } 50% { border-color: white } }
    </style>
</head>
<body>
    <div class="container">
        <h1>ROTNIVKA_IS_ALIVE</h1>
        <p>Material & Identity Architecture</p>
    </div>
</body>
</html>
