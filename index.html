<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ROTNIVKA | Material & Identity Architecture</title>
    <style>
        body { 
            background-color: #050505; 
            color: #e0e0e0; 
            font-family: 'Courier New', Courier, monospace; 
            display: flex; 
            flex-direction: column;
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0;
            text-align: center;
        }
        .container { border: 1px solid #333; padding: 40px; max-width: 80%; }
        h1 { 
            letter-spacing: 5px; 
            font-size: 1.5rem;
            border-right: 3px solid #fff;
            white-space: nowrap;
            overflow: hidden;
            animation: typing 3.5s steps(30, end), blink .75s step-end infinite;
        }
        p { font-size: 0.8rem; color: #888; text-transform: uppercase; margin-top: 20px; }
        @keyframes typing { from { width: 0 } to { width: 100% } }
        @keyframes blink { from, to { border-color: transparent } 50% { border-color: white } }
    </style>
</head>
<body>
    <div class="container">
        <h1>ROTNIVKA_IS_ALIVE</h1>
        <p>Material & Identity Architecture</p>
    </div>
</body>
</html>
