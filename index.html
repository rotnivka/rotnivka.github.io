<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ROTNIVKA | Material & Identity Architecture</title>
    <style>
        /* INVERSIÓN ESTRATÉGICA DE MATERIALES */
        :root {
            --bg-metal: #C0C0C0;       /* Plata como base */
            --text-ink: #1A1A1A;       /* Asfalto como texto */
            --accent-heat: #340001;    /* Rojo Óxido para pops */
        }

        body { 
            background-color: var(--bg-metal); 
            color: var(--text-ink); 
            font-family: 'Courier New', Courier, monospace; 
            margin: 0;
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh;
            padding: 20px;
        }

        /* EL CONTENEDOR V.02 CON LA SOMBRA ROJA */
        .main-frame { 
            border: 4px solid var(--text-ink); 
            padding: 40px 20px; 
            width: 100%; 
            max-width: 600px;
            position: relative;
            box-shadow: 12px 12px 0px var(--accent-heat);
            background-color: var(--bg-metal);
        }

        /* ETIQUETA TÉCNICA */
        .label {
            position: absolute;
            top: -15px;
            left: 20px;
            background: var(--bg-metal);
            padding: 0 10px;
            font-size: 0.7rem;
            color: var(--accent-heat);
            letter-spacing: 3px;
            font-weight: bold;
        }

        h1 { 
            font-family: 'Arial Black', sans-serif;
            font-size: clamp(2.5rem, 10vw, 5rem);
            line-height: 0.85;
            margin: 0;
            text-transform: uppercase;
            word-wrap: break-word;
            color: var(--text-ink);
        }

        .subtitle {
            margin-top: 25px;
            border-top: 2px solid var(--accent-heat); /* Línea de acento roja */
            padding-top: 15px;
            color: var(--text-ink);
            font-size: 0.8rem;
            font-weight: bold;
            letter-spacing: 1.5px;
            line-height: 1.4;
        }

        .status-bar {
            margin-top: 40px;
            display: flex;
            justify-content: space-between;
            font-size: 0.6rem;
            color: var(--accent-heat);
            font-weight: bold;
        }

        /* CURSOR INDUSTRIAL */
        .cursor {
            display: inline-block;
            width: 10px;
            height: 1rem;
            background: var(--accent-heat);
            animation: blink 1s infinite;
        }

        @keyframes blink { 50% { opacity: 0; } }
    </style>
</head>
<body>
    <div class="main-frame">
        <div class="label">ID:ARCH_SYSTEM_V.02_REV</div>
        
        <h1>ROTNIVKA_</h1>
        
        <div class="subtitle">
            MATERIAL & IDENTITY ARCHITECTURE<br>
            // BERLIN, DE <span class="cursor"></span>
        </div>

        <div class="status-bar">
            <span>CORE: ACTIVE</span>
            <span>STRATEGY: ONLINE</span>
            <span>2026©</span>
        </div>
    </div>
</body>
</html>
