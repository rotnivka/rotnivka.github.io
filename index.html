<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ROTNIVKA | Material & Identity Architecture</title>
    <style>
        /* DEFINICIÓN DE MATERIALES BASE */
        :root {
            --bg-color: #050505;        /* Negro Base (Sujeto a cambios) */
            --primary-text: #FFFFFF;    /* Texto Principal */
            --secondary-text: #AAAAAA;  /* Texto Secundario (Gris) */
            --accent-color: #333333;   /* Bordes y Cajas */
            --font-mono: 'Courier New', Courier, monospace; /* Tipografía Técnica */
            --font-display: 'Arial Black', Gadget, sans-serif; /* Tipografía de Impacto */
        }

        body { 
            background-color: var(--bg-color); 
            color: var(--primary-text); 
            font-family: var(--font-mono); 
            margin: 0;
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh;
            padding: 20px;
        }

        /* ESTRUCTURA BRUTALISTA DE CAJAS */
        .system-container { 
            border: 2px solid var(--primary-text); 
            padding: 30px; 
            width: 100%; 
            max-width: 800px;
            box-shadow: 10px 10px 0 var(--accent-color); /* Sombra dura Brutalista */
            text-align: left;
        }

        /* TÍTULOS DE IMPACTO (Display) */
        h1 { 
            font-family: var(--font-display);
            text-transform: uppercase;
            letter-spacing: -1px; 
            font-size: clamp(1.8rem, 8vw, 4rem); /* Responsivo */
            line-height: 0.9;
            margin: 0 0 20px 0;
            border-bottom: 2px solid var(--primary-text);
            padding-bottom: 10px;
        }

        /* TEXTOS TÉCNICOS (Monospace) */
        p { 
            font-size: clamp(0.7rem, 2vw, 0.9rem); /* Responsivo */
            color: var(--secondary-text); 
            text-transform: uppercase; 
            margin: 0;
            letter-spacing: 2px;
            line-height: 1.6;
        }

        .data-stream {
            margin-top: 30px;
            border-top: 1px solid var(--accent-color);
            padding-top: 20px;
        }

    </style>
</head>
<body>
    <div class="system-container">
        <h1>ROTNIVKA_<br>SYSTEM</h1>

        <p>Material & Identity Architecture<br>// Berlin, DE</p>
        
        <div class="data-stream">
            <p>> INITIALIZING MANIFESTO...</p>
            <p>> AESTHETIC STRATEGY ACTIVE.</p>
            <p>> STATUS: IS_ALIVE</p>
        }
    </div>
</body>
</html>
