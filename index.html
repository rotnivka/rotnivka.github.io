<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ROTNIVKA | Material & Identity Architecture</title>
    <style>
        :root {
            --metal-surface: #C0C0C0;  /* Gris Plata (Fondo) */
            --tech-ink: #1A1A1A;       /* Gris Asfalto (Texto) */
            --accent-burn: #340001;    /* Rojo Óxido (Detalles mínimos) */
        }

        body { 
            background-color: var(--metal-surface); 
            color: var(--tech-ink); 
            font-family: 'Courier New', Courier, monospace; 
            margin: 0;
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh;
            padding: 20px;
        }

        /* ESTRUCTURA DE PLANO TÉCNICO */
        .main-frame { 
            border: 2px solid var(--tech-ink); 
            padding: 50px 30px; 
            width: 100%; 
            max-width: 550px;
            position: relative;
            /* Sombra sutil para dar profundidad de lámina */
            box-shadow: 8px 8px 0px rgba(26, 26, 26, 0.2);
        }

        .label {
            position: absolute;
            top: 10px;
            right: 15px;
            font-size: 0.6rem;
            color: var(--tech-ink);
            letter-spacing: 2px;
            font-weight: bold;
        }

        h1 { 
            font-family: 'Arial Black', sans-serif;
            font-size: clamp(2.2rem, 9vw, 4.5rem);
            line-height: 0.8;
            margin: 0;
            text-transform: uppercase;
            letter-spacing: -2px;
        }

        .description {
            margin-top: 30px;
            border-left: 4px solid var(--tech-ink);
            padding-left: 15px;
            font-size: 0.85rem;
            font-weight: bold;
            line-height: 1.5;
            letter-spacing: 1px;
        }

        .footer-info {
            margin-top: 40px;
            display: flex;
            flex-direction: column;
            gap: 5px;
            font-size: 0.65rem;
            border-top: 1px solid rgba(26, 26, 26, 0.3);
            padding-top: 15px;
        }

        /* EL ROJO SOLO COMO UN PULSO TÉCNICO */
        .cursor {
            display: inline-block;
            width: 8px;
            height: 12px;
            background: var(--accent-burn);
            margin-left: 5px;
            animation: blink 1s infinite;
        }

        @keyframes blink { 50% { opacity: 0; } }
    </style>
</head>
<body>
    <div class="main-frame">
        <div class="label">REV_03.2026</div>
        
        <h1>ROTNIV<br>KA_</h1>
        
        <div class="description">
            MATERIAL & IDENTITY ARCHITECTURE<br>
            // STRATEGIC_AESTHETICS
        </div>

        <div class="footer-info">
            <span>LOCATION: BERLIN, DE</span>
            <span>SYSTEM_STATUS: OPERATIONAL <span class="cursor"></span></span>
        </div>
    </div>
</body>
</html>
